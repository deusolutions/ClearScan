{% extends "base.html" %}

{% block title %}Add Network{% endblock %}

{% block content %}
<h1>Add Network</h1>
<div class="row">
    <div class="col-md-6">
        <div class="card">
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label for="name" class="form-label">Network Name</label>
                        <input type="text" class="form-control" id="name" name="name" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="ip_range" class="form-label">IP Range</label>
                        <input type="text" class="form-control" id="ip_range" name="ip_range" 
                               placeholder="192.168.1.0/24" required>
                        <div class="form-text">CIDR notation (e.g., 192.168.1.0/24)</div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="description" class="form-label">Description</label>
                        <textarea class="form-control" id="description" name="description" rows="3"></textarea>
                    </div>
                    
                    <div class="mb-3">
                        <label for="scan_interval" class="form-label">Scan Interval (minutes)</label>
                        <input type="number" class="form-control" id="scan_interval" name="scan_interval" 
                               value="60" min="5" required>
                    </div>
                    
                    <button type="submit" class="btn btn-primary">Add Network</button>
                    <a href="{{ url_for('index') }}" class="btn btn-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
