<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ClearScan Login</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">
    <form method="post" class="bg-white p-8 rounded shadow-md w-96">
        <h2 class="text-2xl font-bold mb-6 text-center">Вход в ClearScan</h2>
        {% if error %}
        <div class="mb-4 text-red-600">{{ error }}</div>
        {% endif %}
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="mb-4">
            <label class="block mb-1">Логин</label>
            <input name="username" class="w-full border px-3 py-2 rounded" required>
        </div>
        <div class="mb-6">
            <label class="block mb-1">Пароль</label>
            <input name="password" type="password" class="w-full border px-3 py-2 rounded" required>
        </div>
        <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700">Войти</button>
    </form>
</body>
</html>
